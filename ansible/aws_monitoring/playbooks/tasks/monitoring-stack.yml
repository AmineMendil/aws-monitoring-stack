---
# ==========================================
# PROMETHEUS + GRAFANA
# SUR monitoring-server
# ==========================================

- name: Install Prometheus and Grafana
  hosts: monitoring
  become: yes

  tasks:

    # -----------------------------
    # UPDATE SYSTEM
    # -----------------------------
    - name: Update apt cache
      apt:
        update_cache: yes

    # =============================
    # PROMETHEUS INSTALLATION
    # =============================

    - name: Create prometheus user
      user:
        name: prometheus
        system: yes
        shell: /usr/sbin/nologin

    - name: Create directories
      file:
        path: "{{ item }}"
        state: directory
        owner: prometheus
      loop:
        - /etc/prometheus
        - /var/lib/prometheus

    - name: Download Prometheus
      get_url:
        url: https://github.com/prometheus/prometheus/releases/download/v2.54.1/prometheus-2.54.1.linux-amd64.tar.gz
        dest: /tmp/prometheus.tar.gz

    - name: Extract Prometheus
      unarchive:
        src: /tmp/prometheus.tar.gz
        dest: /tmp/
        remote_src: yes

    - name: Install binaries
      copy:
        src: "{{ item }}"
        dest: /usr/local/bin/
        mode: '0755'
        remote_src: yes
      loop:
        - /tmp/prometheus-2.54.1.linux-amd64/prometheus
        - /tmp/prometheus-2.54.1.linux-amd64/promtool

    # =============================
    # PROMETHEUS CONFIG
    # =============================

    - name: Configure Prometheus targets
      copy:
        dest: /etc/prometheus/prometheus.yml
        content: |
          global:
            scrape_interval: 5s

          scrape_configs:
            - job_name: "node_exporter"
              static_configs:
                - targets:
                    - "{{ hostvars['web-server'].ansible_host }}:9100"
                    - "{{ hostvars['db-server'].ansible_host }}:9100"
                    - "{{ hostvars['monitoring-server'].ansible_host }}:9100"

    # =============================
    # PROMETHEUS SERVICE
    # =============================

    - name: Create Prometheus service
      copy:
        dest: /etc/systemd/system/prometheus.service
        content: |
          [Unit]
          Description=Prometheus
          After=network.target

          [Service]
          User=prometheus
          ExecStart=/usr/local/bin/prometheus \
            --config.file=/etc/prometheus/prometheus.yml \
            --storage.tsdb.path=/var/lib/prometheus

          [Install]
          WantedBy=multi-user.target

    - name: Start Prometheus
      systemd:
        name: prometheus
        enabled: yes
        state: started
        daemon_reload: yes

    # =============================
    # GRAFANA INSTALLATION
    # =============================

    - name: Add Grafana key
      apt_key:
        url: https://packages.grafana.com/gpg.key

    - name: Add Grafana repo
      apt_repository:
        repo: "deb https://packages.grafana.com/oss/deb stable main"

    - name: Install Grafana
      apt:
        name: grafana
        update_cache: yes

    - name: Enable Grafana
      systemd:
        name: grafana-server
        enabled: yes
        state: started

    # =============================
    # GRAFANA → PROMETHEUS LINK
    # =============================

    - name: Configure Grafana datasource
      copy:
        dest: /etc/grafana/provisioning/datasources/prometheus.yml
        content: |
          apiVersion: 1

          datasources:
            - name: Prometheus
              type: prometheus
              access: proxy
              url: http://localhost:9090
              isDefault: true

    - name: Restart Grafana
      systemd:
        name: grafana-server
        state: restarted